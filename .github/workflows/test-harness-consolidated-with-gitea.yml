name: PSR Template Test Harness (Consolidated with Gitea)

on:
  repository_dispatch:
    types: [test-harness-run]

permissions:
  contents: write

concurrency:
  group: psr-test-harness-${{ github.repository }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      test_branch: ${{ steps.compute-branch.outputs.test_branch }}
      git_server_url: ${{ steps.git-config.outputs.server_url }}
    steps:
      - name: Compute git configuration
        id: git-config
        run: |
          if [ -n "$ACT" ]; then
            echo "server_url=http://localhost:3000" >> $GITHUB_OUTPUT
          else
            echo "server_url=https://github.com" >> $GITHUB_OUTPUT
          fi

      - name: Checkout fixture repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ github.repository }}
          ref: main
          token: ${{ env.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          github-server-url: ${{ steps.git-config.outputs.server_url }}

      - name: Clean up stale tags and releases from previous runs
        uses: ./.github/actions/consolidated-cleanup-tags-and-releases

      - name: Compute branch name
        id: compute-branch
        run: |
          TEST_BRANCH="ci/${{ github.event.client_payload.run_id }}"
          echo "test_branch=${TEST_BRANCH}" >> $GITHUB_OUTPUT

      - name: Test action (for debugging Gitea population)
        uses: ./.github/actions/test-hello

  pre-release-tests:
    runs-on: ubuntu-latest
    needs: setup
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout fixture repository from Gitea
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ env.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          github-server-url: ${{ needs.setup.outputs.git_server_url }}
          fetch-depth: 25

      - name: Create and push test branch to Gitea
        run: |
          git config user.name "Gitea Setup"
          git config user.email "setup@gitea.local"
          git checkout -b ${{ needs.setup.outputs.test_branch }}
          git push -u origin ${{ needs.setup.outputs.test_branch }}

      - name: Install uv
        uses: ./.github/actions/install-uv

      - name: Set up venv
        uses: ./.github/actions/setup-venv

      - name: Install dev dependencies
        uses: ./.github/actions/install-dev-dependencies

      - name: Run pre-PSR integration tests
        uses: ./.github/actions/run-pre-psr-tests

  # Phase 1: v0.1.0 (via reusable workflow)
  phase-1:
    needs: [setup, pre-release-tests]
    uses: ./.github/workflows/run-psr-phase.yml
    secrets: inherit
    with:
      phase: '1'
      test_branch: ${{ needs.setup.outputs.test_branch }}
      git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 2: v0.2.0 (via reusable workflow)
  phase-2:
    needs: [setup, phase-1]
    uses: ./.github/workflows/run-psr-phase.yml
    secrets: inherit
    with:
      phase: '2'
      test_branch: ${{ needs.setup.outputs.test_branch }}
      git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 3: v1.0.0 (force major - via reusable workflow)
  phase-3:
    needs: [setup, phase-2]
    uses: ./.github/workflows/run-psr-phase.yml
    secrets: inherit
    with:
      phase: '3'
      test_branch: ${{ needs.setup.outputs.test_branch }}
      git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 4: v1.0.0 (docs only - via reusable workflow)
  phase-4:
    needs: [setup, phase-3]
    uses: ./.github/workflows/run-psr-phase.yml
    secrets: inherit
    with:
      phase: '4'
      test_branch: ${{ needs.setup.outputs.test_branch }}
      git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 5: v1.0.1 (via reusable workflow)
  phase-5:
    needs: [setup, phase-4]
    uses: ./.github/workflows/run-psr-phase.yml
    secrets: inherit
    with:
      phase: '5'
      test_branch: ${{ needs.setup.outputs.test_branch }}
      git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Post-release tests
  post-release-tests:
    needs: [setup, phase-1, phase-2, phase-3, phase-4, phase-5]
    if: always()
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
      PSR_VALIDATE_REAL: '0'
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout fixture repository from Gitea
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.setup.outputs.test_branch }}
          token: ${{ env.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          github-server-url: ${{ needs.setup.outputs.git_server_url }}
          fetch-depth: 25

      - name: Install uv
        uses: ./.github/actions/install-uv

      - name: Set up venv
        uses: ./.github/actions/setup-venv

      - name: Install dev dependencies
        uses: ./.github/actions/install-dev-dependencies

      - name: Run post-PSR tests
        uses: ./.github/actions/run-post-psr-tests

      - name: Clean up test branch
        if: always()
        run: |
          git checkout main || true
          git branch -D ${{ needs.setup.outputs.test_branch }} 2>/dev/null || true

      - name: Final cleanup local tags
        if: always()
        run: git tag -d $(git tag) 2>/dev/null || true

  # Post-workflow cleanup: Remove GitHub artifacts (experimental)
  # NOTE: This cleanup job runs on GitHub mode only after all phases complete.
  #       Controlled by cleanup_after flag in dispatch payload (default: true).
  #       For ACT mode: Use `make clean-tags-and-releases` Makefile target instead.
  cleanup:
    needs: [setup, post-release-tests]
    if: ${{ github.event.client_payload.cleanup_after && always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fixture repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up test artifacts
        uses: ./.github/actions/consolidated-cleanup-tags-and-releases
