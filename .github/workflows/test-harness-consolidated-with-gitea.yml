name: PSR Template Test Harness (Consolidated with Gitea)

on:
  repository_dispatch:
    types: [test-harness-run]

permissions:
  contents: write

concurrency:
  group: psr-test-harness-${{ github.repository }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      test_branch: ${{ steps.compute-branch.outputs.test_branch }}
      git_server_url: ${{ steps.git-config.outputs.server_url }}
    steps:
      - name: Compute git configuration
        id: git-config
        run: |
          if [ -n "$ACT" ]; then
            echo "server_url=http://localhost:3000" >> $GITHUB_OUTPUT
          else
            echo "server_url=https://github.com" >> $GITHUB_OUTPUT
          fi

      - name: Checkout fixture repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ github.repository }}
          ref: main
          token: ${{ env.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          github-server-url: ${{ steps.git-config.outputs.server_url }}

      - name: Clean up stale tags and releases from previous runs
        uses: ./.github/actions/consolidated-cleanup-tags-and-releases

      - name: Compute branch name
        id: compute-branch
        run: |
          TEST_BRANCH="ci/${{ github.event.client_payload.run_id }}"
          echo "test_branch=${TEST_BRANCH}" >> $GITHUB_OUTPUT

      - name: Configure git for branch operations
        run: |
          git config user.name "CI Setup"
          git config user.email "setup@ci.local"

      - name: Create and checkout test branch
        run: |
          git checkout -b ${{ steps.compute-branch.outputs.test_branch }}

      - name: Squash entire repo history into single commit
        run: |
          # Squash all historical commits down to one clean commit
          # This reduces PSR parse time by eliminating hundreds of accumulated repo commits
          # The test branch is ephemeral, so we can rewrite history aggressively
          FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
          echo "Squashing all commits since root: $FIRST_COMMIT"
          git reset --soft $FIRST_COMMIT
          git commit -m "Squashed fixture repo history for CI testing"

      - name: Push test branch to remote
        run: |
          git push -u origin ${{ steps.compute-branch.outputs.test_branch }} --force-with-lease

  pre-release-tests:
    runs-on: ubuntu-latest
    needs: setup
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout test branch from Gitea
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.setup.outputs.test_branch }}
          token: ${{ env.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          github-server-url: ${{ needs.setup.outputs.git_server_url }}
          fetch-depth: 0

      - name: Install uv
        uses: ./.github/actions/install-uv

      - name: Set up venv
        uses: ./.github/actions/setup-venv

      - name: Install dev dependencies
        uses: ./.github/actions/install-dev-dependencies

      - name: Run pre-PSR integration tests
        uses: ./.github/actions/run-pre-psr-tests

  # Phase 1: v0.1.0 (pure features - tests minor bump)
  phase-1:
    needs: [setup, pre-release-tests]
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      tag: ${{ steps.run-psr-phase.outputs.tag }}
      version: ${{ steps.run-psr-phase.outputs.version }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Run PSR Phase 1
        id: run-psr-phase
        uses: ./.github/actions/run-psr-phase
        with:
          phase: '1'
          test_branch: ${{ needs.setup.outputs.test_branch }}
          git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 2: v0.2.0 (mixed fix+feat - tests feature precedence)
  phase-2:
    needs: [setup, phase-1]
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      tag: ${{ steps.run-psr-phase.outputs.tag }}
      version: ${{ steps.run-psr-phase.outputs.version }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Run PSR Phase 2
        id: run-psr-phase
        uses: ./.github/actions/run-psr-phase
        with:
          phase: '2'
          test_branch: ${{ needs.setup.outputs.test_branch }}
          git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 3: v1.0.0 (mixed fix+feat + force major override)
  phase-3:
    needs: [setup, phase-2]
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      tag: ${{ steps.run-psr-phase.outputs.tag }}
      version: ${{ steps.run-psr-phase.outputs.version }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Run PSR Phase 3
        id: run-psr-phase
        uses: ./.github/actions/run-psr-phase
        with:
          phase: '3'
          test_branch: ${{ needs.setup.outputs.test_branch }}
          git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 4: v1.0.0 (pure docs - tests no version change)
  phase-4:
    needs: [setup, phase-3]
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      tag: ${{ steps.run-psr-phase.outputs.tag }}
      version: ${{ steps.run-psr-phase.outputs.version }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Run PSR Phase 4
        id: run-psr-phase
        uses: ./.github/actions/run-psr-phase
        with:
          phase: '4'
          test_branch: ${{ needs.setup.outputs.test_branch }}
          git_server_url: ${{ needs.setup.outputs.git_server_url }}

  # Phase 5: v1.0.1 (mixed fix+docs - tests fix precedence)
  phase-5:
    needs: [setup, phase-4]
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      tag: ${{ steps.run-psr-phase.outputs.tag }}
      version: ${{ steps.run-psr-phase.outputs.version }}
    steps:
      - name: Run PSR Phase 5
        id: run-psr-phase
        uses: ./.github/actions/run-psr-phase
        with:
          phase: '5'
          test_branch: ${{ needs.setup.outputs.test_branch }}
          git_server_url: ${{ needs.setup.outputs.git_server_url }}  # Post-release tests
  post-release-tests:
    needs: [setup, phase-1, phase-2, phase-3, phase-4, phase-5]
    runs-on: ubuntu-latest
    env:
      UV_VENV: /tmp/venv
      PSR_VALIDATE_REAL: '0'
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout fixture repository from Gitea
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.setup.outputs.test_branch }}
          token: ${{ env.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
          github-server-url: ${{ needs.setup.outputs.git_server_url }}
          fetch-depth: 25

      - name: Install uv
        uses: ./.github/actions/install-uv

      - name: Set up venv
        uses: ./.github/actions/setup-venv

      - name: Install dev dependencies
        uses: ./.github/actions/install-dev-dependencies

      - name: Run post-PSR tests
        uses: ./.github/actions/run-post-psr-tests
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up test branch
        if: always()
        run: |
          git checkout main || true
          git branch -D ${{ needs.setup.outputs.test_branch }} 2>/dev/null || true

      - name: Final cleanup local tags
        if: always()
        run: git tag -d $(git tag) 2>/dev/null || true

  # Post-workflow cleanup: Remove GitHub artifacts (experimental)
  # NOTE: This cleanup job runs on GitHub mode only after all phases complete.
  #       Controlled by cleanup_after flag in dispatch payload (default: true).
  #       For ACT mode: Use `make clean-tags-and-releases` Makefile target instead.
  cleanup:
    needs: [setup, post-release-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fixture repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up test artifacts
        uses: ./.github/actions/consolidated-cleanup-tags-and-releases
